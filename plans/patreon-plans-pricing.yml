specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Patreon
providerId: patreon
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Creator Economy
- Membership
- Subscription
- Plans
description: Patreon platform pricing — a single creator plan that takes a percentage of earnings.
notes: >-
  Patreon switched away from tiered Lite/Pro/Premium plans to a single unified pricing
  model. Creators pay a flat platform fee on income earned, plus payment processing,
  currency conversion, payout, and applicable taxes. API access is free with any
  creator account; no separate API SKU.
sources:
- https://www.patreon.com/pricing
- https://docs.patreon.com/
plans:
- id: patreon-creator
  name: Creator
  type: usage
  description: >-
    Free to start. Patreon takes 10% of income earned plus payment processing,
    currency conversion, payout fees, and applicable taxes. API access is included
    for any creator account.
  entries:
  - label: Platform Fee
    name: platform_fee
    type: percentage
    metric: earnings
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 10% of creator earnings
    userMultiplied: false
  - label: API Access
    name: api_access
    type: included
    metric: api_call
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Subscriptions and one-time payments
  - name: Content publishing (audio, video, images, livestream)
  - name: Member analytics and growth tools
  - name: REST API v2 (JSON:API) and webhooks
  - name: Multi-currency support
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
